<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Deteni Online</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
.card{background:white;padding:15px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px}
button{background:#0b3d91;color:white;border:none}
img{width:60px}
</style>
</head>

<body>

<div id="login" class="card">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Input Barang</h3>
<input id="nama" placeholder="Nama Deteni">
<input id="barang" placeholder="Barang">
<input type="file" id="foto">
<button onclick="simpan()">Simpan</button>
</div>

<div class="card">
<h3>Data</h3>
<div id="data"></div>
</div>

<div class="card">
<button onclick="startScan()">Scan QR</button>
<div id="reader"></div>
</div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
function login(){
 if(document.getElementById("user").value=="admin" &&
    document.getElementById("pass").value=="123"){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
 } else {
  alert("Login gagal");
 }
}

function simpan(){
 let file = document.getElementById("foto").files[0];
 let reader = new FileReader();

 reader.onload = function(){
  let data = JSON.parse(localStorage.getItem("data")) || [];

  data.push({
   nama: document.getElementById("nama").value,
   barang: document.getElementById("barang").value,
   foto: reader.result
  });

  localStorage.setItem("data", JSON.stringify(data));
  load();
 }

 reader.readAsDataURL(file);
}

function load(){
 let data = JSON.parse(localStorage.getItem("data")) || [];
 let html="";

 data.forEach((d,i)=>{
  let qr = "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data="+i;
  html += `
  <div class="card">
  ${d.nama} - ${d.barang}<br>
  <img src="${d.foto}"><br>
  <img src="${qr}">
  </div>`;
 });

 document.getElementById("data").innerHTML = html;
}

function startScan(){
 const html5QrCode = new Html5Qrcode("reader");
 html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  qrCodeMessage => {
    alert("QR Code: " + qrCodeMessage);
    html5QrCode.stop();
  }
 );
}
</script>

</body>
</html>
